# MongoDB local: variables en .env o valores por defecto (mismos que application.yaml / .env.example).
services:
  mongo:
    image: mongo:7
    container_name: franchise-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-cambia_esto_en_local}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-franchise_db}
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
