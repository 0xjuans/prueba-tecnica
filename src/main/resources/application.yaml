server:
  port: 8080

spring:
  data:
    mongodb:
      # Sobrescribe con MONGODB_URI en entorno o en .env (no versionar .env).
      # Valor por defecto = mismo placeholder que .env.example (solo desarrollo local).
      uri: ${MONGODB_URI:mongodb://admin:cambia_esto_en_local@localhost:27017/franchise_db?authSource=admin}

# Swagger configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha