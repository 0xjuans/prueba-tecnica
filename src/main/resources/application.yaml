server:
  port: 8080

spring:
  data:
    mongodb:
      # Definir MONGODB_URI en .env (copiar desde .env.example); no versionar secretos.
      uri: ${MONGODB_URI}

# Swagger configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha